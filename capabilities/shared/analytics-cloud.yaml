naftiko: "1.0.0-alpha1"

info:
  label: "SAP Business Intelligence Analytics Cloud API"
  description: "REST API for SAP Analytics Cloud enabling story management, model administration, data import, and user provisioning for business intelligence."
  tags:
    - Analytics
    - Business Intelligence
    - Cloud
    - SAP
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SAP_BI_OAUTH_TOKEN: SAP_BI_OAUTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: sap-bi-analytics-cloud
      baseUri: https://{tenant}.sapanalytics.cloud/api/v1
      description: "SAP Analytics Cloud REST API for managing stories, models, users, and folders."
      authentication:
        type: bearer
        token: "{{SAP_BI_OAUTH_TOKEN}}"
      resources:
        - name: stories
          path: /stories
          description: "Manage analytics stories and dashboards."
          operations:
            - name: list-stories
              method: GET
              description: "List all analytics stories accessible to the user."
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
                - name: search
                  in: query
                  type: string
                  required: false
                  description: "Search stories by name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-story
              method: POST
              description: "Create a new analytics story."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
            - name: get-story
              method: GET
              description: "Get details of a specific analytics story."
              inputParameters:
                - name: storyId
                  in: path
                  type: string
                  required: true
                  description: "The story identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: models
          path: /models
          description: "Manage data models and dimensions."
          operations:
            - name: list-models
              method: GET
              description: "List all analytics models."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-model
              method: GET
              description: "Get details of a specific model."
              inputParameters:
                - name: modelId
                  in: path
                  type: string
                  required: true
                  description: "The model identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: users
          path: /users
          description: "Manage users and teams."
          operations:
            - name: list-users
              method: GET
              description: "List all users in the Analytics Cloud tenant."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: sap-bi-analytics-cloud-api
      resources:
        - path: /v1/stories
          name: stories
          description: "Analytics stories."
          operations:
            - method: GET
              name: list-stories
              description: "List analytics stories."
              call: "sap-bi-analytics-cloud.list-stories"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/models
          name: models
          description: "Data models."
          operations:
            - method: GET
              name: list-models
              description: "List data models."
              call: "sap-bi-analytics-cloud.list-models"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: sap-bi-analytics-cloud-mcp
      transport: http
      tools:
        - name: list-stories
          description: "List analytics stories in the SAP Analytics Cloud tenant."
          hints:
            readOnly: true
            openWorld: true
          call: "sap-bi-analytics-cloud.list-stories"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-story
          description: "Get details of a specific analytics story."
          hints:
            readOnly: true
            openWorld: false
          call: "sap-bi-analytics-cloud.get-story"
          with:
            storyId: "tools.storyId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-models
          description: "List all analytics data models."
          hints:
            readOnly: true
            openWorld: true
          call: "sap-bi-analytics-cloud.list-models"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-users
          description: "List all users in the Analytics Cloud tenant."
          hints:
            readOnly: true
            openWorld: true
          call: "sap-bi-analytics-cloud.list-users"
          outputParameters:
            - type: object
              mapping: "$."
