naftiko: "1.0.0-alpha1"

info:
  label: "SAP BusinessObjects BI Platform REST API"
  description: "RESTful web services for SAP BusinessObjects BI Platform administration, content management, scheduling, and reporting via the biprws endpoint."
  tags:
    - Business Intelligence
    - BusinessObjects
    - Reporting
    - SAP
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SAP_BOBJ_LOGON_TOKEN: SAP_BOBJ_LOGON_TOKEN

capability:
  consumes:
    - type: http
      namespace: sap-bi-businessobjects
      baseUri: https://{server}:{port}/biprws
      description: "SAP BusinessObjects BI Platform RESTful Web Services."
      authentication:
        type: apikey
        key: X-SAP-LogonToken
        value: "{{SAP_BOBJ_LOGON_TOKEN}}"
        placement: header
      resources:
        - name: authentication
          path: /logon/long
          description: "Authentication for session management."
          operations:
            - name: logon
              method: POST
              description: "Authenticate and obtain a logon token."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  userName: "{{tools.userName}}"
                  password: "{{tools.password}}"

        - name: info-objects
          path: /v1/infostore
          description: "Manage BI platform content objects."
          operations:
            - name: list-info-objects
              method: GET
              description: "List content objects from the InfoStore."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-info-object
              method: GET
              description: "Get a specific InfoStore object by ID."
              inputParameters:
                - name: objectId
                  in: path
                  type: string
                  required: true
                  description: "The CMS object identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: reports
          path: /v1/reports
          description: "Manage and schedule reports."
          operations:
            - name: list-reports
              method: GET
              description: "List available reports in the BI Platform."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: sap-bi-businessobjects-api
      resources:
        - path: /v1/info-objects
          name: info-objects
          description: "InfoStore content objects."
          operations:
            - method: GET
              name: list-info-objects
              description: "List InfoStore objects."
              call: "sap-bi-businessobjects.list-info-objects"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/reports
          name: reports
          description: "BI platform reports."
          operations:
            - method: GET
              name: list-reports
              description: "List reports."
              call: "sap-bi-businessobjects.list-reports"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: sap-bi-businessobjects-mcp
      transport: http
      tools:
        - name: list-info-objects
          description: "List content objects from the SAP BusinessObjects InfoStore."
          hints:
            readOnly: true
            openWorld: true
          call: "sap-bi-businessobjects.list-info-objects"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-info-object
          description: "Get a specific InfoStore object by its CMS ID."
          hints:
            readOnly: true
            openWorld: false
          call: "sap-bi-businessobjects.get-info-object"
          with:
            objectId: "tools.objectId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-reports
          description: "List available reports in the SAP BusinessObjects BI Platform."
          hints:
            readOnly: true
            openWorld: true
          call: "sap-bi-businessobjects.list-reports"
          outputParameters:
            - type: object
              mapping: "$."
